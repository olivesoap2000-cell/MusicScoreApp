<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>楽譜アプリ</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f14;
    --surface: #1a1a24;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #f0ead6;
    --muted: #6b6880;
    --red: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 28px,
      rgba(201,168,76,0.07) 28px, rgba(201,168,76,0.07) 29px,
      transparent 29px, transparent 33px,
      rgba(201,168,76,0.07) 33px, rgba(201,168,76,0.07) 34px,
      transparent 34px, transparent 38px,
      rgba(201,168,76,0.07) 38px, rgba(201,168,76,0.07) 39px,
      transparent 39px, transparent 43px,
      rgba(201,168,76,0.07) 43px, rgba(201,168,76,0.07) 44px,
      transparent 44px, transparent 48px,
      rgba(201,168,76,0.07) 48px, rgba(201,168,76,0.07) 49px,
      transparent 49px, transparent 100px
    );
    pointer-events: none;
    z-index: 0;
  }

  #main-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  .title-area {
    text-align: center;
    margin-bottom: 60px;
  }

  .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 72px);
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    line-height: 1;
  }

  .app-sub {
    font-size: clamp(11px, 1.5vw, 14px);
    color: var(--muted);
    letter-spacing: 0.3em;
    margin-top: 12px;
    text-transform: uppercase;
  }

  .mic-wrapper {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    opacity: 0.3;
    transition: opacity 0.3s;
  }

  .mic-ring-outer {
    position: absolute;
    inset: -16px;
    border-radius: 50%;
    border: 1px solid var(--gold);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .listening .mic-ring { opacity: 0.8; animation: ring-pulse 1.2s ease-in-out infinite; }
  .listening .mic-ring-outer { opacity: 0.3; animation: ring-pulse 1.2s ease-in-out 0.3s infinite; }

  @keyframes ring-pulse {
    0%, 100% { transform: scale(1); opacity: 0.3; }
    50% { transform: scale(1.06); opacity: 0.8; }
  }

  #mic-btn {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(145deg, #1e1e2e, #141420);
    box-shadow: 0 0 0 2px var(--gold), 0 12px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    z-index: 1;
  }

  #mic-btn:active { transform: scale(0.95); }
  #mic-btn svg { width: 44px; height: 44px; fill: var(--gold); transition: fill 0.3s; }

  .listening #mic-btn {
    box-shadow: 0 0 0 2px var(--red), 0 12px 40px rgba(192,57,43,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .listening #mic-btn svg { fill: var(--red); }

  #status-area {
    margin-top: 48px;
    text-align: center;
    min-height: 60px;
  }

  #status-text {
    font-size: clamp(13px, 2vw, 17px);
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  #recognized-text {
    margin-top: 12px;
    font-size: clamp(18px, 3vw, 26px);
    color: var(--gold-light);
    letter-spacing: 0.1em;
    min-height: 36px;
    font-family: 'Cormorant Garamond', serif;
  }

  /* ログイン画面 */
  #login-area {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    background: var(--bg);
  }

  #login-area .app-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }

  #login-area .app-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.3em;
    margin-bottom: 60px;
  }

  #login-area .login-note {
    margin-top: 24px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.8;
  }

  #login-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--surface);
    border: 1.5px solid var(--gold);
    color: var(--cream);
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    letter-spacing: 0.1em;
    padding: 16px 36px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #login-btn:hover {
    background: #22222e;
    box-shadow: 0 0 20px rgba(201,168,76,0.2);
  }

  #login-btn img { width: 22px; height: 22px; }

  /* 検索結果 */
  #result-list {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 20;
    display: none;
    flex-direction: column;
  }

  #result-list.active { display: flex; }

  .result-header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .result-header-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--gold-light);
    letter-spacing: 0.1em;
  }

  .result-query { font-size: 14px; color: var(--muted); margin-top: 2px; }

  #back-btn {
    margin-left: auto;
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: 'Noto Serif JP', serif;
    font-size: 14px;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.1em;
    -webkit-tap-highlight-color: transparent;
    transition: border-color 0.2s, color 0.2s;
  }

  #back-btn:hover { border-color: var(--cream); color: var(--cream); }

  .result-items {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    -webkit-overflow-scrolling: touch;
  }

  .result-item {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    border-radius: 6px;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .result-item:hover, .result-item:active { background: rgba(201,168,76,0.06); }

  .result-item-icon {
    width: 40px; height: 40px;
    background: rgba(201,168,76,0.1);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .result-item-icon svg { width: 20px; height: 20px; fill: var(--gold); }
  .result-item-name { font-size: 17px; color: var(--cream); letter-spacing: 0.05em; }

  /* PDF表示 */
  #pdf-screen {
    position: fixed;
    inset: 0;
    background: #111;
    z-index: 30;
    display: none;
    flex-direction: column;
  }

  #pdf-screen.active { display: flex; }

  #pdf-frame { flex: 1; border: none; width: 100%; background: #fff; }

  #pdf-close-btn {
    position: fixed;
    top: 16px; right: 16px;
    z-index: 40;
    width: 52px; height: 52px;
    background: rgba(0,0,0,0.7);
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s;
  }

  #pdf-close-btn:hover { background: rgba(0,0,0,0.9); }
  #pdf-close-btn svg { width: 22px; height: 22px; fill: white; }

  /* 音声再生バー */
  #audio-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 45;
    background: rgba(15,15,20,0.92);
    border-top: 1px solid rgba(201,168,76,0.3);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px 24px;
    display: none;
    align-items: center;
    gap: 16px;
  }

  #audio-bar-title {
    flex: 1;
    font-size: 14px;
    color: var(--cream);
    letter-spacing: 0.05em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #audio-bar-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  #audio-play-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: rgba(201,168,76,0.1);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  #audio-play-btn:hover { background: rgba(201,168,76,0.25); }
  #audio-play-btn svg { width: 22px; height: 22px; fill: var(--gold); }
  #audio-play-btn.playing { border-color: var(--red); background: rgba(192,57,43,0.15); }
  #audio-play-btn.playing svg { fill: var(--red); }

  .audio-progress {
    flex: 2;
    height: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    min-width: 60px;
  }

  #audio-progress-fill {
    height: 100%;
    background: var(--gold);
    width: 0%;
    transition: width 0.3s linear;
    border-radius: 2px;
  }

  /* 波形 */
  .wave-bars {
    display: flex;
    gap: 4px;
    align-items: center;
    height: 32px;
    margin-top: 20px;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .wave-bar {
    width: 4px;
    background: var(--gold);
    border-radius: 2px;
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; height: 16px; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; height: 24px; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; height: 16px; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }
  .wave-bar:nth-child(6) { animation-delay: 0.2s; height: 20px; }
  .wave-bar:nth-child(7) { animation-delay: 0.1s; height: 12px; }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.4); }
    50% { transform: scaleY(1); }
  }

  /* ローディング */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15,15,20,0.85);
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    backdrop-filter: blur(4px);
  }

  #loading.active { display: flex; }

  .spinner {
    width: 48px; height: 48px;
    border: 2px solid rgba(201,168,76,0.2);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  #loading-text { color: var(--muted); font-size: 14px; letter-spacing: 0.2em; }

  /* トースト */
  #toast {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream);
    padding: 14px 28px;
    border-radius: 8px;
    font-size: 15px;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    max-width: 90vw;
    text-align: center;
  }

  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-area">
  <div class="app-title">楽譜アプリ</div>
  <div class="app-sub">Sheet Music Viewer</div>
  <button id="login-btn" onclick="handleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Googleでログイン
  </button>
  <div class="login-note">
    ログインすると、あなたのGoogle Drive内の<br>PDFファイルを検索して楽譜を表示します
  </div>
</div>

<!-- メイン画面 -->
<div id="main-screen" style="display:none;">
  <div class="title-area">
    <div class="app-title">楽譜アプリ</div>
    <div class="app-sub">Sheet Music Viewer</div>
  </div>

  <div id="mic-container">
    <div class="mic-wrapper">
      <div class="mic-ring-outer"></div>
      <div class="mic-ring"></div>
      <button id="mic-btn" onclick="toggleListening()">
        <svg id="mic-icon" viewBox="0 0 24 24">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/>
        </svg>
        <svg id="stop-icon" viewBox="0 0 24 24" style="display:none;">
          <rect x="6" y="6" width="12" height="12" rx="2"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="status-area">
    <div id="status-text">タップして曲名を話してください</div>
    <div id="recognized-text"></div>
    <div class="wave-bars" id="wave-bars" style="opacity:0;">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
  </div>
</div>

<!-- 検索結果一覧 -->
<div id="result-list">
  <div class="result-header">
    <div>
      <div class="result-header-title">検索結果</div>
      <div class="result-query" id="result-query-text"></div>
    </div>
    <button id="back-btn" onclick="backToMain()">← 戻る</button>
  </div>
  <div class="result-items" id="result-items"></div>
</div>

<!-- PDF表示 -->
<div id="pdf-screen">
  <iframe id="pdf-frame" src="" allowfullscreen></iframe>
  <button id="pdf-close-btn" onclick="closePDF()">
    <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
  </button>
</div>

<!-- 音声再生バー -->
<div id="audio-bar">
  <button id="audio-play-btn" onclick="toggleAudio()">
    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    <svg id="stop-play-icon" viewBox="0 0 24 24" style="display:none;"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
  </button>
  <div style="flex:1; min-width:0;">
    <div id="audio-bar-label">Now Playing</div>
    <div id="audio-bar-title">—</div>
  </div>
  <div class="audio-progress" onclick="seekAudio(event)">
    <div id="audio-progress-fill"></div>
  </div>
</div>

<!-- ローディング -->
<div id="loading">
  <div class="spinner"></div>
  <div id="loading-text">楽譜を検索中...</div>
</div>

<!-- トースト -->
<div id="toast"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://apis.google.com/js/api.js"></script>

<script>
const CLIENT_ID = '270470441025-8so9rs1js3l44iiuo9v9dq2k24i0124v.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.readonly';

let tokenClient;
let isListening = false;
let recognition = null;
let audioElement = null;
let isPlaying = false;
let progressTimer = null;

window.onload = () => {
  gapi.load('client', async () => {
    await gapi.client.init({});
    await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/drive/v3/rest');
  });

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { showToast('ログインに失敗しました'); return; }
      gapi.client.setToken({ access_token: resp.access_token });
      document.getElementById('login-area').style.display = 'none';
      document.getElementById('main-screen').style.display = 'flex';
      showToast('ログイン完了！');
    }
  });
};

function handleLogin() {
  tokenClient.requestAccessToken({ prompt: 'consent' });
}

// ── 音声認識 ──
function toggleListening() {
  if (isListening) stopListening();
  else startListening();
}

function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('お使いのブラウザは音声認識に対応していません'); return; }

  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isListening = true;
    setListeningUI(true);
    document.getElementById('recognized-text').textContent = '';
    document.getElementById('status-text').textContent = '聞いています...';
  };

  recognition.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) final += t;
      else interim += t;
    }
    document.getElementById('recognized-text').textContent = final || interim;
  };

  recognition.onend = () => {
    const query = document.getElementById('recognized-text').textContent.trim();
    isListening = false;
    setListeningUI(false);
    if (query) searchScores(query);
    else document.getElementById('status-text').textContent = '聞き取れませんでした。もう一度どうぞ';
  };

  recognition.onerror = (e) => {
    isListening = false;
    setListeningUI(false);
    if (e.error === 'no-speech') document.getElementById('status-text').textContent = '音声が検出されませんでした';
    else showToast('音声認識エラー: ' + e.error);
  };

  recognition.start();
}

function stopListening() {
  if (recognition) recognition.stop();
}

function setListeningUI(listening) {
  const container = document.getElementById('mic-container');
  const waveBars = document.getElementById('wave-bars');
  const micIcon = document.getElementById('mic-icon');
  const stopIcon = document.getElementById('stop-icon');

  if (listening) {
    container.classList.add('listening');
    waveBars.style.opacity = '1';
    micIcon.style.display = 'none';
    stopIcon.style.display = 'block';
  } else {
    container.classList.remove('listening');
    waveBars.style.opacity = '0';
    micIcon.style.display = 'block';
    stopIcon.style.display = 'none';
    document.getElementById('status-text').textContent = 'タップして曲名を話してください';
  }
}

// ── 楽譜検索（ログインユーザーのDrive全体） ──
async function searchScores(query) {
  showLoading('楽譜を検索中...');

  try {
    const res = await gapi.client.drive.files.list({
      q: `mimeType='application/pdf' and name contains '${query.replace(/'/g, "\\'")}' and trashed=false`,
      fields: 'files(id, name)',
      pageSize: 50,
      orderBy: 'name'
    });

    const files = res.result.files || [];
    hideLoading();

    if (files.length === 0) {
      showToast(`「${query}」の楽譜が見つかりませんでした`);
      document.getElementById('status-text').textContent = 'タップして曲名を話してください';
      document.getElementById('recognized-text').textContent = '';
      return;
    }

    if (files.length === 1) {
      openPDF(files[0].id, files[0].name);
    } else {
      showResultList(query, files);
    }

  } catch (err) {
    hideLoading();
    console.error(err);
    showToast('検索中にエラーが発生しました');
  }
}

// ── 結果一覧 ──
function showResultList(query, files) {
  document.getElementById('result-query-text').textContent = `「${query}」の検索結果 ${files.length}件`;
  const container = document.getElementById('result-items');
  container.innerHTML = '';

  files.forEach(file => {
    const item = document.createElement('div');
    item.className = 'result-item';
    item.innerHTML = `
      <div class="result-item-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8.5 7.5c0 .83-.67 1.5-1.5 1.5H9v2H7.5V7H10c.83 0 1.5.67 1.5 1.5v1zm5 2c0 .83-.67 1.5-1.5 1.5h-2.5V7H15c.83 0 1.5.67 1.5 1.5v3zm4-3H19v1h1.5V11H19v2h-1.5V7h3v1.5zM9 9.5h1v-1H9v1zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm10 5.5h1v-3h-1v3z"/></svg>
      </div>
      <div class="result-item-name">${file.name.replace(/\.pdf$/i, '')}</div>
    `;
    item.onclick = () => openPDF(file.id, file.name);
    container.appendChild(item);
  });

  document.getElementById('result-list').classList.add('active');
}

function backToMain() {
  document.getElementById('result-list').classList.remove('active');
  document.getElementById('recognized-text').textContent = '';
  document.getElementById('status-text').textContent = 'タップして曲名を話してください';
}

// ── PDF表示 ──
function openPDF(fileId, fileName) {
  document.getElementById('result-list').classList.remove('active');
  document.getElementById('pdf-frame').src = `https://drive.google.com/file/d/${fileId}/preview`;
  document.getElementById('pdf-screen').classList.add('active');
  stopAudio();
  document.getElementById('audio-bar').style.display = 'none';
  if (fileName) {
    const baseName = fileName.replace(/\.pdf$/i, '');
    searchAudioFile(baseName);
  }
}

function closePDF() {
  document.getElementById('pdf-screen').classList.remove('active');
  document.getElementById('pdf-frame').src = '';
  document.getElementById('recognized-text').textContent = '';
  document.getElementById('status-text').textContent = 'タップして曲名を話してください';
  stopAudio();
  document.getElementById('audio-bar').style.display = 'none';
}

// ── 音声検索・再生 ──
async function searchAudioFile(baseName) {
  try {
    const escaped = baseName.replace(/'/g, "\\'");
    const res = await gapi.client.drive.files.list({
      q: `(mimeType contains 'audio/') and name contains '${escaped}' and trashed=false`,
      fields: 'files(id, name, mimeType)',
      pageSize: 5,
      orderBy: 'name'
    });
    const files = res.result.files || [];
    if (files.length > 0) {
      const bar = document.getElementById('audio-bar');
      bar.dataset.fileId = files[0].id;
      document.getElementById('audio-bar-title').textContent = files[0].name.replace(/\.[^.]+$/, '');
      bar.style.display = 'flex';
    }
  } catch (err) {
    console.error('Audio search error:', err);
  }
}

async function toggleAudio() {
  if (isPlaying) {
    stopAudio();
  } else {
    await playAudio();
  }
}

async function playAudio() {
  const bar = document.getElementById('audio-bar');
  const fileId = bar.dataset.fileId;
  const token = gapi.client.getToken();
  if (!fileId || !token) return;

  stopAudio();
  showLoading('音声を読み込み中...');

  try {
    const url = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${token.access_token}` }
    });
    if (!res.ok) throw new Error('fetch failed');

    const blob = await res.blob();
    const objUrl = URL.createObjectURL(blob);
    audioElement = new Audio(objUrl);

    audioElement.onplay = () => {
      isPlaying = true;
      setPlayUI(true);
      progressTimer = setInterval(updateProgress, 500);
    };
    audioElement.onpause = audioElement.onended = () => {
      isPlaying = false;
      setPlayUI(false);
      clearInterval(progressTimer);
    };

    hideLoading();
    audioElement.play();
  } catch (err) {
    hideLoading();
    console.error('Audio play error:', err);
    showToast('音声の再生に失敗しました');
  }
}

function stopAudio() {
  if (audioElement) {
    audioElement.pause();
    audioElement.src = '';
    audioElement = null;
  }
  clearInterval(progressTimer);
  isPlaying = false;
  setPlayUI(false);
  document.getElementById('audio-progress-fill').style.width = '0%';
}

function updateProgress() {
  if (!audioElement || !audioElement.duration) return;
  const pct = (audioElement.currentTime / audioElement.duration) * 100;
  document.getElementById('audio-progress-fill').style.width = pct + '%';
}

function seekAudio(e) {
  if (!audioElement || !audioElement.duration) return;
  const bar = e.currentTarget;
  const ratio = e.offsetX / bar.offsetWidth;
  audioElement.currentTime = ratio * audioElement.duration;
}

function setPlayUI(playing) {
  const btn = document.getElementById('audio-play-btn');
  document.getElementById('play-icon').style.display = playing ? 'none' : 'block';
  document.getElementById('stop-play-icon').style.display = playing ? 'block' : 'none';
  if (playing) btn.classList.add('playing');
  else btn.classList.remove('playing');
}

function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || '読み込み中...';
  document.getElementById('loading').classList.add('active');
}

function hideLoading() {
  document.getElementById('loading').classList.remove('active');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
